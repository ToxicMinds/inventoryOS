services:
  postgres:
    image: postgres:16-alpine
    container_name: inventoryos-db
    environment:
      POSTGRES_DB: inventoryos
      POSTGRES_USER: inventoryos
      POSTGRES_PASSWORD: inventoryos_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventoryos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
