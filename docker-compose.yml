services:
  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: inventoryos-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: inventoryos-dynamodb-admin
    ports:
      - "8086:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local
